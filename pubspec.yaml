name: remind
description: reMind is an Android-first read-it-later and shared coordination app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.3.0
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  firebase_messaging: ^16.1.0
  firebase_storage: ^13.0.5
  cloud_functions: ^6.0.5
  hive_ce: ^2.19.3
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^10.0.0
  workmanager: ^0.9.0+3
  connectivity_plus: ^7.0.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.1
  intl: ^0.20.2
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  test: ^1.26.3

flutter:
  uses-material-design: true
